version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: distilled_postgres
    restart: always
    environment:
      POSTGRES_USER: distilled_user
      POSTGRES_PASSWORD: distilled_password
      POSTGRES_DB: distilled_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: distilled_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: